const SFX = (() => {
  let ctx=null,muted=false;
  const go=()=>{if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx;};
  const tone=(freq,type='sine',vol=0.11,dur=0.18,delay=0,c=null)=>{const ac=c||go(),osc=ac.createOscillator(),g=ac.createGain();osc.connect(g);g.connect(ac.destination);osc.type=type;osc.frequency.setValueAtTime(freq,ac.currentTime+delay);g.gain.setValueAtTime(0.001,ac.currentTime+delay);g.gain.linearRampToValueAtTime(vol,ac.currentTime+delay+0.015);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+dur);osc.start(ac.currentTime+delay);osc.stop(ac.currentTime+delay+dur+0.05);};
  const p=(fn)=>{if(!muted)try{fn();}catch(e){}};
  return{
    setMute:v=>{muted=v;},
    tap:    ()=>p(()=>tone(600,'sine',0.07,0.07)),
    select: ()=>p(()=>tone(440,'sine',0.09,0.1)),
    invalid:()=>p(()=>{const c=go();tone(180,'sine',0.1,0.15,0,c);tone(140,'sine',0.07,0.12,0.1,c);}),
    match:  ()=>p(()=>{const c=go();tone(523,'sine',0.11,0.14,0,c);tone(659,'sine',0.09,0.12,0.08,c);}),
    correct:()=>p(()=>{const c=go();tone(659,'sine',0.13,0.18,0,c);tone(784,'sine',0.11,0.15,0.09,c);tone(1047,'sine',0.1,0.2,0.18,c);}),
    combo:  ()=>p(()=>{const c=go();[523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.13,0.18,i*0.09,c));}),
    wrong:  ()=>p(()=>{const c=go();tone(280,'sine',0.13,0.25,0,c);tone(200,'sine',0.09,0.2,0.22,c);}),
    win:    ()=>p(()=>{const c=go();[523,659,784,1047,1319].forEach((f,i)=>tone(f,'sine',0.16,0.35,i*0.1,c));}),
    lose:   ()=>p(()=>{const c=go();[440,392,349,311].forEach((f,i)=>tone(f,'sine',0.11,0.25,i*0.13,c));}),
    study:  ()=>p(()=>{const c=go();tone(330,'sine',0.13,0.4,0,c);tone(294,'sine',0.09,0.3,0.32,c);}),
    pop:    ()=>p(()=>tone(800,'sine',0.15,0.08)),
    levelup:()=>p(()=>{const c=go();tone(784,'sine',0.12,0.15,0,c);tone(1047,'sine',0.14,0.2,0.12,c);}),
  };
})();

function shuffleArr(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function shuffleQ(q){const idxs=shuffleArr([0,1,2,3]),newOpts=idxs.map(i=>q.opts[i]),newA=idxs.indexOf(q.a);return{...q,opts:newOpts,a:newA};}

function pickQ(gk,subj,usedIds){
  const pool=(subj&&QBANK[gk]?.[subj])||Object.values(QBANK[gk]||{}).flat();
  const avail=pool.filter(q=>!usedIds.includes(q.id));
  const src=avail.length>0?avail:pool;
  const q=src[Math.floor(Math.random()*src.length)];
  return shuffleQ(q);
}

/* ══════════════════════════ BOARD UTILS ══════════════════════════ */
const rnd=()=>Math.floor(Math.random()*4);
const mk=t=>({type:t,id:uid()});
function makeBoard(G){const b=[];for(let r=0;r<G;r++){b.push([]);for(let c=0;c<G;c++){let t;do{t=rnd();}while((c>=2&&b[r][c-2].type===t&&b[r][c-1].type===t)||(r>=2&&b[r-2][c].type===t&&b[r-1][c].type===t));b[r].push(mk(t));}}return b;}
function findM(board,G){const m=new Set();for(let r=0;r<G;r++){let c=0;while(c<G){const t=board[r][c].type;let e=c+1;while(e<G&&board[r][e].type===t)e++;if(e-c>=3)for(let i=c;i<e;i++)m.add(`${r},${i}`);c=e;}}for(let c=0;c<G;c++){let r=0;while(r<G){const t=board[r][c].type;let e=r+1;while(e<G&&board[e][c].type===t)e++;if(e-r>=3)for(let i=r;i<e;i++)m.add(`${i},${c}`);r=e;}}return m;}
function dropFill(board,matches,G){const nb=board.map(row=>row.map(c=>({...c})));matches.forEach(k=>{const[r,c]=k.split(",").map(Number);nb[r][c]=null;});for(let c=0;c<G;c++){let bot=G-1;for(let r=G-1;r>=0;r--){if(nb[r][c]){nb[bot][c]=nb[r][c];if(bot!==r)nb[r][c]=null;bot--;}}for(let r=bot;r>=0;r--)nb[r][c]=mk(rnd());}return nb;}
function swapC(board,a,b){const nb=board.map(r=>[...r]);[nb[a.r][a.c],nb[b.r][b.c]]=[nb[b.r][b.c],nb[a.r][a.c]];return nb;}

function BubblePop({q,correctType,goal,collected,onCollect,onWrongTap,icons,accent}){
  const areaRef=useRef(null);
  const [dim,setDim]=useState({w:320,h:260});
  const [pos,setPos]=useState(null);
  const [poppingType,setPoppingType]=useState(null);
  const [wrongType,setWrongType]=useState(null);
  const BSIZE=88;

  // Measure the arena once mounted
  useEffect(()=>{
    const measure=()=>{
      if(areaRef.current){
        const r=areaRef.current.getBoundingClientRect();
        if(r.width>50)setDim({w:Math.floor(r.width),h:Math.floor(r.height)});
      }
    };
    measure();
    const t=setTimeout(measure,120);
    return()=>clearTimeout(t);
  },[]);

  // Place 4 bubbles (one per answer) when dimensions known
  useEffect(()=>{
    const{w,h}=dim,mx=Math.max(0,w-BSIZE),my=Math.max(0,h-BSIZE);
    const speed=()=>(Math.random()<0.5?1:-1)*(1.2+Math.random()*1.2);
    setPos([
      {x:Math.min(w*0.05,mx),  y:Math.min(h*0.07,my),  vx:speed(),vy:speed()},
      {x:Math.min(w*0.52,mx),  y:Math.min(h*0.07,my),  vx:speed(),vy:speed()},
      {x:Math.min(w*0.05,mx),  y:Math.min(h*0.54,my),  vx:speed(),vy:speed()},
      {x:Math.min(w*0.52,mx),  y:Math.min(h*0.54,my),  vx:speed(),vy:speed()},
    ]);
  },[dim]);

  // JS physics loop — updates left/top so tap target matches visual
  useEffect(()=>{
    if(!pos)return;
    const{w,h}=dim,mx=Math.max(0,w-BSIZE),my=Math.max(0,h-BSIZE);
    const timer=setInterval(()=>{
      setPos(p=>p.map(b=>{
        let{x,y,vx,vy}=b;
        x+=vx;y+=vy;
        if(x<=0){vx=Math.abs(vx);x=0;}else if(x>=mx){vx=-Math.abs(vx);x=mx;}
        if(y<=0){vy=Math.abs(vy);y=0;}else if(y>=my){vy=-Math.abs(vy);y=my;}
        return{x,y,vx,vy};
      }));
    },50);
    return()=>clearInterval(timer);
  },[!!pos,dim]);

  function tapBubble(type){
    if(poppingType!==null||wrongType!==null)return;
    SFX.pop();
    if(type===correctType){
      setPoppingType(type);
      onCollect();
      setTimeout(()=>{
        const{w,h}=dim,mx=Math.max(0,w-BSIZE),my=Math.max(0,h-BSIZE);
        const speed=()=>(Math.random()<0.5?1:-1)*(1.2+Math.random()*1.2);
        setPos(p=>p.map((b,i)=>i===type?{x:Math.random()*mx,y:Math.random()*my,vx:speed(),vy:speed()}:b));
        setPoppingType(null);
      },450);
    }else{
      setWrongType(type);
      onWrongTap();
      setTimeout(()=>setWrongType(null),500);
    }
  }

  const prog=Math.min(1,collected/goal);
  const ct=TC[correctType];

  return(
    <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",gap:5}}>
      {/* Goal bar */}
      <div style={{background:`${ct.bg}22`,borderRadius:13,padding:"9px 14px",flexShrink:0,border:`2px solid ${ct.bg}55`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <span style={{color:"#e2e8f0",fontSize:15,fontWeight:800}}>Pop the</span>
          <div style={{width:38,height:38,borderRadius:"50%",background:`radial-gradient(circle at 35% 30%,${ct.sh},${ct.bg})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,boxShadow:`0 0 14px ${ct.bg}`}}>{icons[correctType]}</div>
          <span style={{color:"#e2e8f0",fontSize:15,fontWeight:800}}>bubbles!</span>
        </div>
        <span style={{color:ct.sh,fontWeight:900,fontSize:19}}>{collected}/{goal}</span>
      </div>
      <div style={{background:"#ffffff14",borderRadius:999,height:10,overflow:"hidden",flexShrink:0}}>
        <div style={{width:`${prog*100}%`,height:"100%",borderRadius:999,background:`linear-gradient(90deg,${ct.bg},${ct.sh})`,transition:"width .4s ease"}}/>
      </div>

      {/* Bubble arena — click targets match visual because we use left/top not transform */}
      <div ref={areaRef} style={{flex:1,minHeight:180,position:"relative",background:"#ffffff05",borderRadius:16,overflow:"hidden",border:`2px solid ${ct.bg}22`}}>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
          <span style={{fontSize:90,opacity:0.05}}>{icons[correctType]}</span>
        </div>

        {pos&&[0,1,2,3].map(type=>{
          const t=TC[type];
          const isCor=type===correctType;
          const isPopping=poppingType===type;
          const isWrong=wrongType===type;
          const b=pos[type];
          const raw=q.opts[type]||"";
          const display=raw.length>12?raw.slice(0,11)+"…":raw;
          return(
            <div key={type}
              onClick={()=>tapBubble(type)}
              style={{
                position:"absolute",
                left:b.x,
                top:b.y,
                width:BSIZE,
                height:BSIZE,
                borderRadius:"50%",
                background:`radial-gradient(circle at 32% 28%,${t.sh},${t.bg})`,
                border:isCor?"3px solid rgba(255,255,255,0.92)":`2px solid ${t.sh}55`,
                boxShadow:isCor?`0 0 22px ${t.bg}cc,0 0 44px ${t.bg}55,0 6px 14px ${t.bg}88`:`0 4px 12px ${t.bg}44`,
                display:"flex",
                flexDirection:"column",
                alignItems:"center",
                justifyContent:"center",
                cursor:"pointer",
                zIndex:isCor?5:3,
                opacity:isPopping?0:1,
                animation:isPopping?"bubbleCorrectPop .45s ease forwards":isWrong?"bubbleWrongShake .5s ease":isCor?"correctGlowAnim 2s ease infinite":"none",
                padding:7,
                gap:3,
                userSelect:"none",
                WebkitUserSelect:"none",
                touchAction:"manipulation",
              }}>
              <span style={{fontSize:28,lineHeight:1}}>{icons[type]}</span>
              <span style={{fontSize:12,fontWeight:900,color:"#fff",textAlign:"center",lineHeight:1.2,textShadow:"0 1px 4px rgba(0,0,0,0.75)",maxWidth:BSIZE-14,overflow:"hidden"}}>{display}</span>
              {isCor&&<span style={{fontSize:10,color:"rgba(255,255,255,0.9)",fontWeight:900}}>TAP ✓</span>}
            </div>
          );
        })}
      </div>

      {/* Answer key legend */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,flexShrink:0,pointerEvents:"none"}}>
        {TC.map((t,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6,background:i===correctType?`${t.bg}28`:"#ffffff08",borderRadius:10,padding:"6px 10px",border:i===correctType?`2px solid ${t.bg}88`:"2px solid transparent"}}>
            <span style={{fontSize:16,flexShrink:0}}>{icons[i]}</span>
            <span style={{color:i===correctType?t.sh:"#475569",fontWeight:i===correctType?900:700,fontSize:13,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",flex:1}}>{q.opts[i]}{i===correctType&&" ✓"}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

                      style={{aspectRatio:"1",borderRadius:12,background:cur?"linear-gradient(135deg,#FFD700,#F59E0B)":done?"linear-gradient(135deg,#4f46e5,#6d28d9)":locked?"#ffffff06":"#ffffff0e",border:cur?"2px solid #fff":done?"2px solid #6d28d9":locked?"2px solid #ffffff08":"2px solid #ffffff18",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:(done||cur)&&!locked?"pointer":"default",opacity:locked?0.3:1,animation:cur?"breathe 2s ease infinite":"none"}}>
                      <span style={{fontSize:10,fontWeight:900,color:cur?"#1a1a2e":done?"#fff":"#374151"}}>{lvl}</span>
                      <span style={{fontSize:9}}>{locked?"🔒":done?(s===3?"⭐":s===2?"✨":"★"):cur?"▶":""}</span>
                      <span style={{fontSize:7,color:cur?"#1a1a2e":def.game==="bubble"?"#ef4444":"#059669"}}>{def.game==="bubble"?"⚡":"🎯"}</span>

}

/* ══════════════════════════ MAIN APP ══════════════════════════ */
function App(){
  const[phase,setPhase]=useState("loading");
  const[gradeKey,setGradeKey]=useState(null);
  const[unlockedGrades,setUnlockedGrades]=useState([]);
  const[packs,setPacks]=useState({});// {gradeKey: number of extra packs bought}
  const[activeGrade,setActiveGrade]=useState(null);// which grade is currently being played
  const[tutStep,setTutStep]=useState(0);
  const[showTut,setShowTut]=useState(false);
  const[showMap,setShowMap]=useState(false);
  const[showGradeShop,setShowGradeShop]=useState(false);
  const[soundOn,setSoundOn]=useState(true);
  const[board,setBoard]=useState(()=>makeBoard(6));
  const[boardG,setBoardG]=useState(6);
  const[sel,setSel]=useState(null);
  const[hi,setHi]=useState(new Set());
  const[q,setQ]=useState(null);
  const[dQ,setDQ]=useState(null);
  const[picked,setPicked]=useState(null);
  const[attempt,setAttempt]=useState(0);
  const[correctType,setCT]=useState(0);
  const[collected,setCol]=useState(0);
  const[goal,setGoal]=useState(8);
  const[moves,setMoves]=useState(24);
  const[ldef,setLdef]=useState(null);
  const[level,setLevel]=useState(1);
  const[lives,setLives]=useState(5);
  const[sessions,setSess]=useState(3);
  const[stars,setStars]=useState({});
  const[winStars,setWinS]=useState(0);
  const[isAnim,setIsAnim]=useState(false);
  const[shakeTile,setShakeTile]=useState(null);
  const[pops2,setPops2]=useState([]);// score popups
  const[confetti,setConfetti]=useState([]);
  const[buyStep,setBuyStep]=useState(0);
  const[combo,setCombo]=useState(0);
  const[studyCD,setStudyCD]=useState(5);
  const[usedQIds,setUsedQIds]=useState([]);// session-level question tracking
  const[charMood,setCharMood]=useState("idle");
  const[charMsg,setCharMsg]=useState("");
  const[charKey,setCharKey]=useState(0);// force re-render for speech

  const livRef=useRef(5),lvlRef=useRef(1),colRef=useRef(0),goalRef=useRef(8),gRef=useRef(6),ctRef=useRef(0),usedRef=useRef([]);
  useEffect(()=>{livRef.current=lives;},[lives]);
  useEffect(()=>{lvlRef.current=level;},[level]);
  useEffect(()=>{colRef.current=collected;},[collected]);
  useEffect(()=>{goalRef.current=goal;},[goal]);
  useEffect(()=>{gRef.current=boardG;},[boardG]);
  useEffect(()=>{ctRef.current=correctType;},[correctType]);
  useEffect(()=>{usedRef.current=usedQIds;},[usedQIds]);
  useEffect(()=>{SFX.setMute(!soundOn);},[soundOn]);

  useEffect(()=>{
    if(phase!=="study")return;
    if(studyCD<=0){retryQ();return;}
    const t=setTimeout(()=>setStudyCD(c=>c-1),1000);
    return()=>clearTimeout(t);
  },[phase,studyCD]);

  useEffect(()=>{
    loadSave().then(s=>{
      if(s){
        setLevel(s.level??1);setSess(s.sessions??3);setStars(s.stars??{});setLives(s.lives??5);
        setGradeKey(s.gradeKey??null);setSoundOn(s.soundOn!==false);
        setUnlockedGrades(s.unlockedGrades??[]);setPacks(s.packs??{});
        setActiveGrade(s.gradeKey??null);setUsedQIds(s.usedQIds??[]);
        livRef.current=s.lives??5;lvlRef.current=s.level??1;usedRef.current=s.usedQIds??[];
      }
      setPhase(s?.gradeKey?"title":"gradeSelect");
    });
  },[]);

  const save=(x={})=>doSave({level,sessions,stars,lives,gradeKey,soundOn,unlockedGrades,packs,usedQIds,...x});

  function setChar(mood,msg){const msgs=CHAR_MSGS[mood]||[];const m=msg||(msgs[Math.floor(Math.random()*msgs.length)]||"");setCharMood(mood);setCharMsg(m);setCharKey(k=>k+1);}

  const addPop=text=>{const id=uid();setPops2(p=>[...p,{id,text}]);setTimeout(()=>setPops2(p=>p.filter(x=>x.id!==id)),900);};
  const spawnCF=()=>{setConfetti(Array.from({length:28},(_,i)=>({id:i,x:Math.random()*100,delay:Math.random()*.5,dur:.9+Math.random()*.7,color:CC[i%CC.length],round:Math.random()>.4})));setTimeout(()=>setConfetti([]),2400);};

  function goToMenu(){SFX.tap();setPhase("title");}

  function beginLevel(lvl,gk){
    SFX.levelup();
    const gKey=gk||activeGrade||gradeKey;
    const def=getLDef(lvl);
    // Pick question, avoiding repeats
    const newQ=pickQ(gKey,def.subj,usedRef.current);
    const newUsed=[...usedRef.current,newQ.id];
    // Reset used if we've exhausted the pool for this grade
    const totalQ=Object.values(QBANK[gKey]||{}).flat().length;
    const finalUsed=newUsed.length>=totalQ?[newQ.id]:newUsed;
    setUsedQIds(finalUsed);usedRef.current=finalUsed;
    lvlRef.current=lvl;gRef.current=def.G;ctRef.current=newQ.a;
    setLevel(lvl);setLdef(def);setQ(newQ);setDQ(newQ);setAttempt(0);setPicked(null);
    setBoard(makeBoard(def.G));setBoardG(def.G);setSel(null);setHi(new Set());
    setMoves(def.moves);setGoal(def.goal);goalRef.current=def.goal;
    setCol(0);colRef.current=0;setCT(newQ.a);setIsAnim(false);setCombo(0);setPops2([]);
    setShowMap(false);setChar("think");
    setPhase("question");
  }

  function answerQ(idx){
    if(picked!==null)return;
    setPicked(idx);
    if(idx===dQ.a){
      SFX.correct();setChar("happy");
      const bonus=attempt===0?3:0;
      setTimeout(()=>{if(bonus)setMoves(m=>m+bonus);setPhase("playing");setChar("idle");},1700);
    } else {
      SFX.wrong();setChar("sad");
      setTimeout(()=>{SFX.study();setStudyCD(attempt===0?5:3);setPhase("study");},1300);
    }
  }

  function retryQ(){
    // Shuffle the SAME question's options differently
    const reshuffled=shuffleQ(q);
    setDQ(reshuffled);setPicked(null);setAttempt(a=>a+1);setChar("think");setPhase("question");
  }

  async function clickTile(r,c){
    if(isAnim||phase!=="playing")return;
    if(!sel){SFX.select();setSel({r,c});return;}
    if(sel.r===r&&sel.c===c){setSel(null);return;}
    const dr=Math.abs(r-sel.r),dc=Math.abs(c-sel.c);
    if(dr+dc!==1){SFX.select();setSel({r,c});return;}
    const a=sel,b={r,c};setSel(null);setIsAnim(true);
    const capMoves=moves,G=gRef.current,sw=swapC(board,a,b),fm=findM(sw,G);
    if(!fm.size){SFX.invalid();setBoard(sw);setShakeTile(`${a.r},${a.c}`);await wait(220);setBoard(board);setShakeTile(null);setIsAnim(false);return;}
    setBoard(sw);
    let cur=sw,curM=fm,cbo=0,newCor=0;
    while(curM.size){
      setHi(curM);
      let batch=0;curM.forEach(k=>{const[rr,cc]=k.split(",").map(Number);if(cur[rr][cc].type===ctRef.current)batch++;});
      newCor+=batch;
      if(batch>0){SFX.correct();addPop(`✓ +${batch} correct!`);setChar("happy");}else SFX.match();
      if(cbo>=2){SFX.combo();addPop(`🔥 ${cbo+1}× COMBO!`);setChar("excited");}
      await wait(380);cur=dropFill(cur,curM,G);setBoard(cur);setHi(new Set());cbo++;await wait(250);curM=findM(cur,G);
    }
    const newMoves=capMoves-1;setMoves(newMoves);
    if(cbo>=2){setCombo(cbo);setTimeout(()=>setCombo(0),1400);}
    setCol(prev=>{const nc=prev+newCor;colRef.current=nc;if(nc>=goalRef.current)setTimeout(()=>winLevel(nc),250);else if(newMoves<=0)setTimeout(()=>loseLevel(),250);return nc;});
    setIsAnim(false);
  }

  function bubbleCollect(){
    SFX.correct();setChar("happy");
    setCol(prev=>{const nc=prev+1;colRef.current=nc;if(nc>=goalRef.current){setTimeout(()=>winLevel(nc),300);}return nc;});
    addPop("✓ Popped!");
  }

  function winLevel(fc){
    SFX.win();setChar("win");
    const g=goalRef.current,pct=fc/g,s=pct>=1.5?3:pct>=1.2?2:1,lvl=lvlRef.current,best=Math.max(stars[lvl]||0,s),ns={...stars,[lvl]:best};
    setStars(ns);setWinS(best);
    const nextLevel=Math.max(level,lvl+1);
    save({stars:ns,level:nextLevel,lives,usedQIds:usedRef.current});
    spawnCF();setPhase("win");
  }
  function loseLevel(){SFX.lose();setChar("sad");const nl=Math.max(0,livRef.current-1);setLives(nl);livRef.current=nl;save({lives:nl,usedQIds:usedRef.current});if(nl<=0)setPhase("shop");else setPhase("lose");}

  function buySession(){const ns=sessions+1;setSess(ns);setLives(5);livRef.current=5;save({sessions:ns,lives:5});setBuyStep(2);setTimeout(()=>{setBuyStep(0);setPhase("title");},2200);}

  function buyPack(packIdx){
    // Mock purchase — in production: PayFast R10
    const gk=activeGrade||gradeKey;
    const newPacks={...packs,[gk]:(packs[gk]||0)+1};

            <button onClick={goToMenu} style={{background:"#ffffff14",borderRadius:10,padding:"6px 10px",color:"#fff",fontWeight:900,fontSize:15,border:"1px solid #ffffff22",display:"flex",alignItems:"center",gap:4}}>🏠 Menu</button>
            <div style={{display:"flex",gap:5,alignItems:"center"}}>
              {[{icon:"❤️",val:lives,col:"#ff6b6b"},{icon:"🎯",val:moves,col:ldef.game==="bubble"?"#ef4444":"#6ee7b7"}].map(({icon,val,col})=>(
                <div key={icon} style={{background:"#ffffff14",borderRadius:11,padding:"4px 9px",display:"flex",alignItems:"center",gap:3,border:"1px solid #ffffff18"}}><span style={{fontSize:12}}>{icon}</span><span style={{color:col,fontWeight:900,fontSize:16}}>{val}</span></div>
              ))}
              <div style={{background:"#ffffff14",borderRadius:11,padding:"4px 8px",display:"flex",alignItems:"center",gap:2,border:"1px solid #ffffff18"}}><span style={{color:"#64748b",fontSize:12,fontWeight:700}}>Lv</span><span style={{color:"#fff",fontWeight:900,fontSize:15}}>{level}/{totalLevels}</span></div>
              <button onClick={toggleSound} style={{background:"#ffffff14",borderRadius:9,padding:"4px 7px",color:"#fff",fontWeight:800,fontSize:14,border:"none"}}>{soundOn?"🔊":"🔇"}</button>
            </div>
          </div>

          {/* Question reminder */}
          <div style={{background:"#ffffff0c",borderRadius:10,padding:"4px 9px",flexShrink:0,border:"1px solid #ffffff12",display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:16}}>{SICONS[q.s||"Maths"][q.a]}</span>
            <span style={{color:"#cbd5e1",fontSize:14,fontWeight:700,flex:1,lineHeight:1.3}}>{q.q}</span>
          </div>

          {/* BUBBLE POP game */}
          {ldef.game==="bubble"&&(
            <BubblePop q={q} correctType={correctType} goal={goal} collected={collected} onCollect={bubbleCollect} onWrongTap={()=>{SFX.invalid();}} icons={icons} accent={accent}/>
          )}

          {/* TILE MATCH game */}
          {ldef.game==="match"&&(
            <>
              {/* Goal bar */}
              <div style={{background:"#ffffff0c",borderRadius:11,padding:"6px 11px",flexShrink:0,border:`1.5px solid ${ct.bg}44`}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:3}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}><span style={{color:"#e2e8f0",fontSize:14,fontWeight:800}}>Collect</span><div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(145deg,${ct.sh},${ct.bg})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{icons[correctType]}</div><span style={{color:"#e2e8f0",fontSize:14,fontWeight:800}}>tiles</span></div>
                  <span style={{color:ct.sh,fontWeight:900,fontSize:18}}>{collected}/{goal}</span>
                </div>
                <div style={{background:"#ffffff14",borderRadius:999,height:8,overflow:"hidden"}}><div style={{width:`${prog*100}%`,height:"100%",borderRadius:999,background:`linear-gradient(90deg,${ct.bg},${ct.sh})`,transition:"width .4s ease"}}/></div>
                <div style={{marginTop:3,fontSize:13,color:"#94a3b8",fontWeight:700}}>{icons[correctType]} = <strong style={{color:ct.sh}}>{q.opts[correctType]}</strong></div>
              </div>
              {combo>=2&&<div style={{textAlign:"center",fontWeight:900,fontSize:19,color:"#FFD700",animation:"popIn .3s ease",textShadow:"0 2px 12px #FFD70090",flexShrink:0}}>🔥 {combo}× COMBO!</div>}
              {/* Board */}
              <div style={{flex:1,minHeight:0,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
                <div style={{width:"min(calc(100vw - 16px), 480px)",aspectRatio:"1",maxHeight:"100%"}}>
                  <div style={{display:"grid",gridTemplateColumns:`repeat(${boardG},1fr)`,gap:"min(1vw,5px)",width:"100%",height:"100%"}}>
                    {board.map((row,r)=>row.map((tile,c)=>{
                      const key=`${r},${c}`,isSel=sel?.r===r&&sel?.c===c,isHi=hi.has(key),isSh=shakeTile===key,isCor=tile.type===correctType,t=TC[tile.type],icon=icons[tile.type]||"?",text=abbr(q.opts[tile.type],boardG);
                      return<div key={tile.id} onClick={()=>clickTile(r,c)} className={`tile${isSel?" t-sel":""}${isHi?" t-glow":""}${isSh?" t-shake":""}`}
                        style={{borderRadius:"min(2.5vw,10px)",background:isHi?`radial-gradient(circle at 40% 30%,${t.sh},${t.bg})`:`linear-gradient(145deg,${t.sh},${t.bg})`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",border:isSel?"2.5px solid #fff":isCor?`2.5px solid ${t.sh}`:"2.5px solid transparent",boxShadow:isSel?`0 0 0 2px ${t.bg},0 4px 14px ${t.bg}77`:isCor?`0 0 8px ${t.bg}99`:"0 2px 4px #0004",opacity:isCor?1:0.68,padding:"1px",gap:"1px"}}>
                        <span style={{fontSize:`min(${boardG>=8?"6vw":"7.2vw"},${boardG>=8?"26px":"32px"})`,lineHeight:1}}>{icon}</span>
                        {text&&<span style={{fontSize:`min(${boardG>=7?"3vw":"3.5vw"},${boardG>=7?"12px":"14px"})`,color:"#fff",fontWeight:900,textShadow:"0 1px 3px #0008",lineHeight:1,textAlign:"center"}}>{text}</span>}
                      </div>;}))
                    }
                  </div>
                </div>
              </div>
              {/* Legend */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,flexShrink:0,pointerEvents:"none"}}>
                {TC.map((t,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:5,background:i===correctType?`${t.bg}28`:"#ffffff08",borderRadius:9,padding:"4px 8px",border:i===correctType?`1.5px solid ${t.bg}88`:"1.5px solid transparent"}}><span style={{fontSize:16,flexShrink:0}}>{icons[i]}</span><span style={{color:i===correctType?t.sh:"#475569",fontWeight:i===correctType?900:700,fontSize:10,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",flex:1}}>{q.opts[i]}{i===correctType&&" ✓"}</span></div>)}
              </div>
            </>
          )}
        </div>
      )}

      {/* WIN */}
      {phase==="win"&&ldef&&(
        <div style={{textAlign:"center",animation:"slideUp .5s ease",maxWidth:370,width:"100%"}}>
          <BackBtn onClick={goToMenu}/>
          <div style={{fontSize:70,marginBottom:4,animation:"popIn .6s ease"}}>🏆</div>
          <h2 style={{fontSize:30,fontWeight:900,background:"linear-gradient(135deg,#FFD700,#FF9B45)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>LEVEL DONE!</h2>
          <div style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:4,marginBottom:10,background:"#ffffff12",borderRadius:20,padding:"4px 14px"}}><span style={{fontSize:18}}>{ldef.icon}</span><span style={{color:"#a78bfa",fontWeight:800,fontSize:15}}>{ldef.name} — {level}/{totalLevels}</span></div>
          {q&&<div style={{background:"#ffffff10",borderRadius:14,padding:"9px 14px",marginBottom:10,border:"1px solid #ffffff18"}}><p style={{color:"#94a3b8",fontSize:14,fontWeight:700,marginBottom:3}}>{q.q}</p><p style={{color:"#6ee7b7",fontWeight:900,fontSize:18}}>✓ {q.opts[correctType]}</p></div>}
          <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:10}}>{[1,2,3].map((s,i)=><span key={s} style={{fontSize:36,display:"inline-block",filter:winStars>=s?"none":"grayscale(1) opacity(.2)",animation:winStars>=s?`starPop .45s ease ${i*.18}s both`:"none"}}>⭐</span>)}</div>
          {level<totalLevels?<div style={{background:"#ffffff10",borderRadius:14,padding:"7px 14px",marginBottom:10,border:"1px solid #ffffff18"}}><p style={{color:"#6ee7b7",fontWeight:900,fontSize:16}}>{totalLevels-level} levels left to go!</p></div>:<div style={{background:"#FFD70022",borderRadius:14,padding:"8px 14px",marginBottom:10,border:"2px solid #FFD70066"}}><p style={{color:"#FFD700",fontWeight:900,fontSize:14}}>🎓 All {totalLevels} levels done! Buy more packs or try another grade!</p></div>}
          {level<totalLevels&&<Btn onClick={()=>beginLevel(level+1)} grad="linear-gradient(135deg,#6d28d9,#4f46e5)">Next Level ({level+1}/{totalLevels}) →</Btn>}
          {level>=totalLevels&&<Btn onClick={()=>setPhase("shop")} grad="linear-gradient(135deg,#b45309,#f59e0b)">🛒 Buy 25 More Levels — R10</Btn>}
          <Btn onClick={()=>beginLevel(level)} grad="linear-gradient(135deg,#0f766e,#0891b2)" mt={8} sm>Play Level Again</Btn>
          <Btn onClick={()=>{SFX.tap();setShowMap(true);setPhase("title");}} grad="#ffffff14" mt={8} sm>🗺️ View Level Map</Btn>
        </div>
      )}

      {/* LOSE */}
      {phase==="lose"&&(
        <div style={{textAlign:"center",animation:"slideUp .5s ease",maxWidth:370,width:"100%"}}>
          <BackBtn onClick={goToMenu}/>
          <div style={{fontSize:64,marginBottom:6}}>😔</div>
          <h2 style={{color:"#ff6b6b",fontSize:26,fontWeight:900,marginBottom:6}}>SO CLOSE!</h2>
          <p style={{color:"#94a3b8",fontSize:15,marginBottom:6}}>{collected} of {goal} correct {ldef?.game==="bubble"?"pops":"tiles"}</p>
          {q&&<div style={{background:"#ffffff0c",borderRadius:14,padding:"9px 12px",marginBottom:8,border:"1px solid #ffffff14"}}><p style={{color:"#94a3b8",fontSize:14,fontWeight:700,marginBottom:3}}>{q.q}</p><p style={{color:"#6ee7b7",fontWeight:900,fontSize:16}}>✓ {q.opts[correctType]}</p></div>}
          <p style={{color:"#fca5a5",fontWeight:800,fontSize:15,marginBottom:12}}>❤️ Lives: {lives} &nbsp;·&nbsp; Level {level}/{totalLevels}</p>
          <Btn onClick={()=>beginLevel(level)} grad="linear-gradient(135deg,#6d28d9,#4f46e5)">🔁 Try Again</Btn>
          <Btn onClick={()=>{SFX.tap();setBuyStep(0);setPhase("shop");}} grad="linear-gradient(135deg,#b45309,#f59e0b)" mt={8} sm>🎫 Buy Extra Session — R5</Btn>
          <Btn onClick={goToMenu} grad="#ffffff14" mt={8} sm>🏠 Main Menu</Btn>
        </div>
      )}

      {/* SHOP */}
      {phase==="shop"&&(
        <div style={{textAlign:"center",animation:"slideUp .45s ease",maxWidth:390,width:"100%"}}>
          <BackBtn onClick={goToMenu}/>
          {buyStep===2
            ?<div style={{animation:"popIn .5s ease"}}><div style={{fontSize:74}}>🎉</div><h2 style={{color:"#6ee7b7",fontSize:26,fontWeight:900,marginTop:8}}>Payment Successful!</h2><p style={{color:"#fff",marginTop:10}}>Added · Enjoy playing!</p></div>
            :<>
              <h2 style={{color:"#FFD700",fontSize:26,fontWeight:900,marginBottom:4}}>🛒 Akili Shop</h2>
              <p style={{color:"#94a3b8",marginBottom:14,fontSize:13}}>Lives, level packs, and grade unlocks</p>

              {/* Sessions / Lives */}
              <div style={{background:"linear-gradient(145deg,#1e1b4b,#312e81)",borderRadius:20,padding:"18px 16px",marginBottom:10,border:"2px solid #4f46e5"}}>
                <div style={{fontSize:36,marginBottom:6}}>🎫</div>
                <div style={{color:"#fff",fontWeight:900,fontSize:17,marginBottom:8}}>Extra Session — 5 Lives</div>
                {["5 extra lives","Keep all progress","Instant access"].map(f=><p key={f} style={{color:"#a78bfa",fontWeight:700,fontSize:14,marginBottom:4}}>✓ {f}</p>)}
                <div style={{marginTop:8,fontSize:30,fontWeight:900,color:"#FFD700"}}>R5.00</div>
              </div>

              {/* Level packs */}
              <div style={{background:"linear-gradient(145deg,#1a2e1e,#0d3320)",borderRadius:20,padding:"18px 16px",marginBottom:10,border:"2px solid #059669"}}>
                <div style={{fontSize:36,marginBottom:6}}>📦</div>
                <div style={{color:"#fff",fontWeight:900,fontSize:17,marginBottom:8}}>25 New Levels Pack</div>
                {["25 brand-new levels","Different questions in every pack","Up to 30 packs per grade","Same great game, new challenges"].map(f=><p key={f} style={{color:"#6ee7b7",fontWeight:700,fontSize:14,marginBottom:4}}>✓ {f}</p>)}
                <div style={{marginTop:8,fontSize:30,fontWeight:900,color:"#6ee7b7"}}>R10.00</div>
              </div>

              {/* Higher grade unlock */}
              <div style={{background:"linear-gradient(145deg,#2a1a08,#3d2210)",borderRadius:20,padding:"18px 16px",marginBottom:14,border:"2px solid #b45309"}}>
                <div style={{fontSize:36,marginBottom:6}}>🎓</div>
                <div style={{color:"#fff",fontWeight:900,fontSize:17,marginBottom:8}}>Unlock Higher Grade</div>
                {["Access a harder grade level","25 free levels + buyable packs","Harder questions, bigger challenge"].map(f=><p key={f} style={{color:"#FCD34D",fontWeight:700,fontSize:14,marginBottom:4}}>✓ {f}</p>)}
                <div style={{marginTop:8,fontSize:30,fontWeight:900,color:"#FCD34D"}}>R10.00</div>
              </div>

              {buyStep===0&&(
                <>
                  <Btn onClick={()=>setBuyStep(1)} grad="linear-gradient(135deg,#b45309,#f59e0b)">Proceed to Payment</Btn>
                  <Btn onClick={goToMenu} grad="#ffffff14" mt={8} sm>🏠 Back to Menu</Btn>
                </>
              )}
              {buyStep===1&&(
                <div style={{animation:"slideUp .35s ease"}}>
                  <div style={{background:"#ffffff0e",borderRadius:18,padding:14,border:"1px solid #ffffff1a",marginBottom:12,textAlign:"left"}}>
                    <p style={{color:"#fff",fontWeight:900,marginBottom:7}}>💳 Payment</p>
                    <div style={{background:"#0f172a",borderRadius:12,padding:10,fontSize:12,color:"#94a3b8",marginBottom:8,lineHeight:1.8}}><span style={{color:"#fff",fontWeight:800}}>R5</span> = 1 Session (5 lives)<br/><span style={{color:"#fff",fontWeight:800}}>R10</span> = 25 Level Pack or Grade Unlock<br/><span style={{color:"#fff",fontWeight:800}}>Gateway:</span> PayFast / Yoco / SnapScan</div>
                    <p style={{color:"#64748b",fontSize:11,fontWeight:700}}>⚡ Connects to <strong style={{color:"#a78bfa"}}>PayFast</strong> or <strong style={{color:"#a78bfa"}}>Yoco</strong> in production.</p>
                  </div>
                  <Btn onClick={buySession} grad="linear-gradient(135deg,#16a34a,#15803d)">✓ Confirm R5 Session</Btn>
                  <Btn onClick={()=>setBuyStep(0)} grad="#ffffff14" mt={8} sm>← Back</Btn>
                </div>
              )}
            </>
          }
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
